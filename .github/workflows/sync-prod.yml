name: Sync to prod

on:
  push:
    branches: [main]
  # Fallback: catches any push event GitHub suppressed (bot-token merges) or a
  # failed earlier run. Worst case a promotion PR shows up a few hours late.
  schedule:
    - cron: "49 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sync-prod
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Open promotion PR if main is ahead of prod
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"

          if ! gh api "repos/${repo}/branches/prod" --silent 2>/dev/null; then
            echo "No prod branch; nothing to sync."
            exit 0
          fi

          ahead=$(gh api "repos/${repo}/compare/prod...main" --jq .ahead_by)
          if [ "${ahead}" -eq 0 ]; then
            echo "prod is up to date with main."
            exit 0
          fi

          open=$(gh pr list --repo "${repo}" --base prod --head main --state open --json number --jq length)
          if [ "${open}" -gt 0 ]; then
            echo "Promotion PR already open; it tracks main automatically."
            exit 0
          fi

          gh pr create --repo "${repo}" \
            --base prod --head main \
            --title "Promote main to prod" \
            --body "$(printf 'Automated promotion PR: main is %s commit(s) ahead of prod.\n\nMerging (merge commit) mints the next patch release and builds the image. Label with release:minor or release:major before merging to change the version bump.' "${ahead}")"
