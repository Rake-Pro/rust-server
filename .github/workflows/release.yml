name: Release

on:
  # Normal path: a promotion PR merges into prod; this run mints the next
  # semver tag and builds from it, all in one workflow (a tag pushed with
  # GITHUB_TOKEN cannot trigger another workflow, so nothing is chained).
  push:
    branches: [prod]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  version:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.next.outputs.tag }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute and push next version tag
        id: next
        run: |
          set -euo pipefail
          if [ -n "$(git tag --points-at HEAD -l 'v*')" ]; then
            echo "HEAD already tagged; skipping release."
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "${latest}" ]; then
            next="v1.0.0"
          else
            labels=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              --jq '[.[].labels[].name] | join(",")' || echo "")
            bump=patch
            case ",${labels}," in
              *,release:major,*) bump=major ;;
              *,release:minor,*) bump=minor ;;
            esac
            IFS=. read -r ma mi pa <<< "${latest#v}"
            case "${bump}" in
              major) next="v$((ma+1)).0.0" ;;
              minor) next="v${ma}.$((mi+1)).0" ;;
              patch) next="v${ma}.${mi}.$((pa+1))" ;;
            esac
          fi

          git tag "${next}" "${GITHUB_SHA}"
          git push origin "refs/tags/${next}"
          echo "tag=${next}" >> "$GITHUB_OUTPUT"

  build:
    needs: [version]
    # Runs for a freshly minted tag (prod merge) or a manually pushed v* tag.
    if: always() && (needs.version.outputs.tag != '' || github.ref_type == 'tag')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve release tag
        id: rel
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.version.outputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ steps.rel.outputs.tag }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.rel.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.rel.outputs.tag }}
            type=sha,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-scan:
    name: Trivy scan
    needs: [build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/rake-pro/rust-server:${{ needs.build.outputs.version }}
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
